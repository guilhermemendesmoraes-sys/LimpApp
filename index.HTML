<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador de Segurança: Misturas de Limpeza</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>Simulador de Misturas Químicas</h1>
        <p class="subtitulo">Descubra se a combinação de produtos de limpeza doméstica é segura ou perigosa.</p>

        <div class="painel-selecao">
            <div class="campo">
                <label for="produtoA">1º Produto:</label>
                <select id="produtoA" onchange="calcularMistura()">
                    <option value="">Selecione um produto...</option>
                    <option value="agua_sanitaria">Água Sanitária (Cloro)</option>
                    <option value="vinagre">Vinagre (Ácido)</option>
                    <option value="amonia">Amoníaco (Amônia)</option>
                    <option value="alcool">Álcool Etílico</option>
                    <option value="detergente">Detergente Neutro</option>
                </select>
            </div>
            
            <div class="campo">
                <label for="produtoB">2º Produto:</label>
                <select id="produtoB" onchange="calcularMistura()">
                    <option value="">Selecione um produto...</option>
                    <option value="agua_sanitaria">Água Sanitária (Cloro)</option>
                    <option value="vinagre">Vinagre (Ácido)</option>
                    <option value="amonia">Amoníaco (Amônia)</option>
                    <option value="alcool">Álcool Etílico</option>
                    <option value="detergente">Detergente Neutro</option>
                </select>
            </div>
        </div>

        <div id="quadroResultado" class="resultado-box">
            <div id="statusTitulo" class="status-titulo"></div>
            <div id="statusDescricao" class="status-descricao"></div>
        </div>
    </div>

    <script>
        function calcularMistura() {
            const pA = document.getElementById('produtoA').value;
            const pB = document.getElementById('produtoB').value;
            const quadro = document.getElementById('quadroResultado');
            const titulo = document.getElementById('statusTitulo');
            const descricao = document.getElementById('statusDescricao');

            if (!pA || !pB) {
                quadro.className = "resultado-box";
                return;
            }

            if (pA === pB) {
                mostrarResposta("seguro", "✓ Mistura sem reação", "Misturar o mesmo produto não gera novos gases ou perigos químicos.");
                return;
            }

            const combinacao = [pA, pB].sort().join('_+_');

            switch(combinacao) {
                case "agua_sanitaria_+_vinagre":
                    mostrarResposta("perigo", "✕ PERIGO EXTREMO: Gás Cloro", "A mistura de cloro com ácidos (como o vinagre) libera o Gás Cloro. Ele é altamente tóxico e causa queimaduras graves nas vias respiratórias.");
                    break;
                case "agua_sanitaria_+_amonia":
                    mostrarResposta("perigo", "✕ PERIGO EXTREMO: Cloraminas", "Gera gases tóxicos chamados cloraminas. Podem causar graves danos pulmonares e falta de ar.");
                    break;
                case "agua_sanitaria_+_alcool":
                    mostrarResposta("perigo", "✕ PERIGO: Clorofórmio", "Pode produzir clorofórmio, substância que ataca o sistema nervoso central, causando tonturas e desmaios.");
                    break;
                case "alcool_+_vinagre":
                    mostrarResposta("seguro", "✓ Mistura Segura", "Não gera gases tóxicos, mas um produto pode anular a eficiência de limpeza do outro.");
                    break;
                case "agua_sanitaria_+_detergente":
                case "detergente_+_vinagre":
                case "alcool_+_detergente":
                case "amonia_+_detergente":
                    mostrarResposta("seguro", "✓ Mistura Segura", "O detergente neutro é quimicamente estável. Lembre-se de manter o ambiente bem ventilado.");
                    break;
                default:
                    mostrarResposta("seguro", "✓ Sem riscos graves conhecidos", "Esta combinação específica não possui relatos de reações perigosas.");
            }
        }

        function mostrarResposta(tipo, textoTitulo, textoDescricao) {
            const quadro = document.getElementById('quadroResultado');
            const titulo = document.getElementById('statusTitulo');
            const descricao = document.getElementById('statusDescricao');

            quadro.className = `resultado-box ${tipo}`;
            titulo.innerText = textoTitulo;
            descricao.innerText = textoDescricao;
        }
    </script>
</body>
</html>
